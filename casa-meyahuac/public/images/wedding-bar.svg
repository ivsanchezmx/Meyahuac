<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="weddingBg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.35"/>
      <stop offset="35%" stop-color="#1a2f1e" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="#0a0a0a"/>
  <rect width="800" height="1000" fill="url(#weddingBg)"/>

  <!-- Velas / luces colgantes -->
  <g fill="#e0c061" opacity="0.85">
    <circle cx="120" cy="120" r="3"/>
    <circle cx="220" cy="90" r="2.5"/>
    <circle cx="320" cy="140" r="3.5"/>
    <circle cx="430" cy="100" r="2.5"/>
    <circle cx="540" cy="160" r="3"/>
    <circle cx="650" cy="120" r="3"/>
    <circle cx="180" cy="210" r="2"/>
    <circle cx="380" cy="200" r="2"/>
    <circle cx="600" cy="220" r="2"/>
  </g>
  <g stroke="#c9a84c" stroke-opacity="0.3" stroke-width="0.5">
    <line x1="120" y1="120" x2="120" y2="50"/>
    <line x1="220" y1="90" x2="220" y2="40"/>
    <line x1="320" y1="140" x2="320" y2="50"/>
    <line x1="430" y1="100" x2="430" y2="40"/>
    <line x1="540" y1="160" x2="540" y2="50"/>
    <line x1="650" y1="120" x2="650" y2="40"/>
  </g>

  <!-- Barra de mármol negro -->
  <rect x="0" y="650" width="800" height="350" fill="url(#bar)"/>
  <line x1="0" y1="650" x2="800" y2="650" stroke="#c9a84c" stroke-opacity="0.55"/>
  <line x1="0" y1="660" x2="800" y2="660" stroke="#c9a84c" stroke-opacity="0.18"/>

  <!-- Botellas alineadas -->
  <g transform="translate(0 480)">
    <!-- Bottle 1 -->
    <g transform="translate(180 0)">
      <rect x="-10" y="-10" width="20" height="20" fill="#0a0a0a" stroke="#c9a84c" stroke-opacity="0.5"/>
      <path d="M -25 0 Q -25 20 -32 35 L -32 160 Q -32 175 -20 175 L 20 175 Q 32 175 32 160 L 32 35 Q 25 20 25 0 Z" fill="#1a2f1e" stroke="#c9a84c" stroke-opacity="0.55"/>
      <path d="M -28 50 L -28 165 Q -28 172 -20 172 L 20 172 Q 28 172 28 165 L 28 50 Z" fill="#c9a84c" opacity="0.65"/>
    </g>
    <!-- Bottle 2 -->
    <g transform="translate(280 0)">
      <rect x="-10" y="-10" width="20" height="20" fill="#0a0a0a" stroke="#c8631e" stroke-opacity="0.5"/>
      <path d="M -25 0 Q -25 20 -32 35 L -32 160 Q -32 175 -20 175 L 20 175 Q 32 175 32 160 L 32 35 Q 25 20 25 0 Z" fill="#1a1a1a" stroke="#c8631e" stroke-opacity="0.55"/>
      <path d="M -28 50 L -28 165 Q -28 172 -20 172 L 20 172 Q 28 172 28 165 L 28 50 Z" fill="#c8631e" opacity="0.7"/>
    </g>
    <!-- Bottle 3 -->
    <g transform="translate(400 0)">
      <rect x="-12" y="-12" width="24" height="22" fill="#0a0a0a" stroke="#8b1a1a" stroke-opacity="0.5"/>
      <path d="M -28 0 Q -28 22 -36 38 L -36 160 Q -36 178 -22 178 L 22 178 Q 36 178 36 160 L 36 38 Q 28 22 28 0 Z" fill="#1a0a0a" stroke="#8b1a1a" stroke-opacity="0.55"/>
      <path d="M -32 50 L -32 168 Q -32 175 -22 175 L 22 175 Q 32 175 32 168 L 32 50 Z" fill="#8b1a1a" opacity="0.75"/>
    </g>
    <!-- Bottle 4 -->
    <g transform="translate(520 0)">
      <rect x="-10" y="-10" width="20" height="20" fill="#0a0a0a" stroke="#d4b46a" stroke-opacity="0.5"/>
      <path d="M -25 0 Q -25 20 -32 35 L -32 160 Q -32 175 -20 175 L 20 175 Q 32 175 32 160 L 32 35 Q 25 20 25 0 Z" fill="#1f1a10" stroke="#d4b46a" stroke-opacity="0.55"/>
      <path d="M -28 50 L -28 165 Q -28 172 -20 172 L 20 172 Q 28 172 28 165 L 28 50 Z" fill="#d4b46a" opacity="0.65"/>
    </g>
  </g>

  <!-- Copas de cristal -->
  <g stroke="#c9a84c" stroke-opacity="0.6" fill="none">
    <g transform="translate(620 540)">
      <path d="M -22 0 Q -22 30 0 35 Q 22 30 22 0 Z" fill="#c9a84c" fill-opacity="0.15"/>
      <line x1="0" y1="35" x2="0" y2="65"/>
      <ellipse cx="0" cy="68" rx="20" ry="3"/>
    </g>
    <g transform="translate(680 555)">
      <path d="M -18 0 Q -18 25 0 30 Q 18 25 18 0 Z" fill="#c9a84c" fill-opacity="0.12"/>
      <line x1="0" y1="30" x2="0" y2="55"/>
      <ellipse cx="0" cy="58" rx="16" ry="2.5"/>
    </g>
  </g>

  <!-- Reflejos en el mármol -->
  <g opacity="0.3" fill="#c9a84c">
    <ellipse cx="180" cy="680" rx="34" ry="4"/>
    <ellipse cx="280" cy="680" rx="34" ry="4"/>
    <ellipse cx="400" cy="680" rx="38" ry="4"/>
    <ellipse cx="520" cy="680" rx="34" ry="4"/>
  </g>
</svg>
